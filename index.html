<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coevaluación - Tec de Monterrey</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --tec-blue: #003399;
            --tec-light-blue: #0056b3;
            --tec-gray: #f4f4f4;
        }

        .step-content { display: none; }
        .step-content.active { display: block; }
        
        .likert-grid {
            display: grid;
            grid-template-columns: 1.5fr repeat(5, 1fr);
            gap: 0.5rem;
            align-items: center;
        }

        @media (max-width: 768px) {
            .likert-grid { grid-template-columns: 1fr; }
        }

        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        input[type="radio"] {
            cursor: pointer;
            accent-color: #003399;
        }

        /* Spinner para carga */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #003399;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-4 md:p-8 text-slate-800">
    <div class="max-w-5xl mx-auto bg-white shadow-2xl rounded-3xl overflow-hidden border border-slate-200">
        <!-- Encabezado -->
        <div class="bg-white p-6 flex flex-col items-center border-b-4 border-[#003399]">
            <img src="https://image.admisiones.tec.mx/lib/fe2b11747364057f721176/m/1/b910ad21-1913-4ce0-8f35-38c908814125.png" 
                 alt="Tec de Monterrey" 
                 class="h-16 md:h-20 object-contain mb-4">
            <h1 class="text-xl md:text-2xl font-black text-[#003399] uppercase tracking-tight text-center">
                Sistema de Coevaluación Académica
            </h1>
        </div>

        <!-- Barra de Progreso -->
        <div class="w-full bg-slate-200 h-2 overflow-hidden">
            <div id="progressBar" class="bg-[#003399] h-full transition-all duration-700 ease-in-out" style="width: 5%"></div>
        </div>

        <form id="evaluationForm" class="p-8 md:p-12">
            
            <!-- PASO 0: Configuración Inicial -->
            <div id="step0" class="step-content active fade-in space-y-8">
                <div class="bg-blue-50 p-8 rounded-3xl border border-blue-100">
                    <h2 class="text-xl font-bold text-[#003399] mb-6 flex items-center">
                        <span class="bg-[#003399] text-white w-8 h-8 rounded-full flex items-center justify-center mr-3 text-sm font-bold">1</span>
                        Configuración del Equipo
                    </h2>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                        <div>
                            <label class="block text-xs font-black text-slate-500 mb-2 uppercase tracking-widest">¿A cuántos compañeros evaluarás?</label>
                            <select name="tamanoEquipo" id="tamanoEquipo" class="w-full p-4 bg-white border-2 border-slate-200 rounded-xl focus:border-[#003399] outline-none transition font-bold text-slate-700">
                                <option value="2">2 compañeros</option>
                                <option value="3" selected>3 compañeros</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-xs font-black text-slate-500 mb-2 uppercase tracking-widest">Número de Equipo</label>
                            <div id="teamContainer" class="grid grid-cols-5 gap-2"></div>
                        </div>
                    </div>
                </div>

                <div class="pt-6">
                    <button type="button" onclick="nextStep(1)" class="w-full bg-[#003399] hover:bg-[#002673] text-white font-black py-5 rounded-2xl shadow-xl transition-all transform hover:-translate-y-1 active:scale-95 uppercase tracking-widest text-sm">
                        Comenzar Evaluación
                    </button>
                </div>
            </div>

            <!-- Contenedor para Pasos Dinámicos -->
            <div id="dynamicSteps"></div>
        </form>

        <!-- Mensajes de Estado y Pantalla de Carga -->
        <div id="statusMessage" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-md flex items-center justify-center p-4 z-50">
            <div id="statusCard" class="bg-white p-10 rounded-3xl max-w-sm w-full text-center shadow-2xl border-t-8 border-[#003399]">
                <div id="loadingIndicator" class="hidden"><div class="loader"></div></div>
                <div id="statusIcon" class="mb-6 text-6xl"></div>
                <h3 id="statusTitle" class="text-2xl font-black mb-3 text-slate-800 uppercase tracking-tight"></h3>
                <p id="statusDesc" class="text-slate-500 mb-8 font-medium leading-relaxed"></p>
                <button id="statusBtn" onclick="closeStatus()" class="w-full bg-[#003399] hover:bg-[#002673] text-white py-4 rounded-xl font-black transition-colors uppercase tracking-widest text-xs">Entendido</button>
            </div>
        </div>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbykG4NEvAhGMn164J1TwSQc9ZkYYMkaOmvL9xnrk5ltg17RxkzVVGMXtkzMqsPO8Dts/exec"; // Inserta aquí tu URL de Apps Script
        
        let isSubmitting = false;
        const items = [
            "Cumplió en tiempo y forma las actividades que le fueron asignadas",
            "Fue puntual en las reuniones del grupo",
            "Participó activamente en las reuniones",
            "Se esmeró y mostró interés en la presentación del trabajo",
            "Participó activamente en las sesiones En Vivo cuando tocaba participar el equipo en plenaria",
            "Intervino voluntariamente durante las sesiones En Vivo, para exponer su punto de vista",
            "Fundamentó sus opiniones en elementos teóricos y prácticos",
            "Tuvo capacidad para reconocer sus errores"
        ];

        const likertScales = ["Totalmente en desacuerdo", "En desacuerdo", "Neutral", "De acuerdo", "Totalmente de acuerdo"];
        let currentStep = 0;
        let totalSteps = 0;

        // Generar números de equipo
        const teamContainer = document.getElementById('teamContainer');
        for(let i=1; i<=10; i++) {
            teamContainer.innerHTML += `
                <label class="relative flex items-center justify-center cursor-pointer group w-full">
                    <input type="radio" name="equipo" value="${i}" required class="peer sr-only">
                    <div class="w-full text-center py-3 bg-white border-2 border-slate-200 rounded-xl text-sm font-black text-slate-500 transition-all peer-checked:bg-[#003399] peer-checked:text-white peer-checked:border-[#003399] group-hover:border-blue-300">
                        ${i}
                    </div>
                </label>
            `;
        }

        window.toggleRetro = function(companero, item, valor) {
            const divId = `retro_c${companero}_item${item}`;
            const div = document.getElementById(divId);
            if (!div) return;

            const textarea = div.querySelector('textarea');
            if (valor == "1") { 
                div.classList.remove('hidden');
                textarea.required = true;
            } else {
                div.classList.add('hidden');
                textarea.required = false;
                textarea.value = "";
            }
        };

        function createDynamicSteps() {
            const numAevaluar = parseInt(document.getElementById('tamanoEquipo').value);
            const container = document.getElementById('dynamicSteps');
            container.innerHTML = '';
            totalSteps = numAevaluar;

            for (let i = 1; i <= numAevaluar; i++) {
                const step = document.createElement('div');
                step.id = `step${i}`;
                step.className = 'step-content fade-in space-y-10';
                
                let html = `
                    <div class="border-b-2 border-slate-100 pb-6 mb-8 flex justify-between items-center">
                        <div>
                            <span class="text-[10px] font-black text-[#003399] uppercase tracking-[0.2em] mb-1 block">Fase de Evaluación</span>
                            <h2 class="text-2xl font-black text-slate-800 uppercase tracking-tighter">Evaluando al Compañero ${i}</h2>
                        </div>
                        <div class="bg-blue-50 px-4 py-2 rounded-full border border-blue-100">
                            <span class="text-sm font-black text-[#003399] font-bold">${i} de ${numAevaluar}</span>
                        </div>
                    </div>
                    <div class="bg-slate-50 p-6 rounded-2xl border-2 border-slate-100 shadow-inner">
                        <label class="block text-xs font-black text-slate-400 mb-3 uppercase tracking-widest">Nombre del compañero:</label>
                        <input type="text" name="nombre_companero_${i}" required 
                               class="w-full p-4 bg-white border border-slate-200 rounded-xl outline-none focus:ring-4 focus:ring-blue-100 focus:border-[#003399] transition font-bold" 
                               placeholder="Nombre completo">
                    </div>
                    <div class="space-y-12">
                `;

                items.forEach((itemText, idx) => {
                    html += `
                        <div class="space-y-5 pb-8 border-b border-slate-50">
                            <div class="likert-grid">
                                <div class="text-base text-slate-700 font-bold leading-snug pr-6">
                                    <span class="text-[#003399] opacity-30 mr-2 text-xl italic font-black">${idx + 1}</span> ${itemText}
                                </div>
                                
                                <div class="flex flex-col md:flex-row md:contents gap-2">
                                    ${likertScales.map((label, sIdx) => {
                                        const val = sIdx + 1;
                                        return `
                                        <label class="flex flex-row md:flex-col items-center gap-3 md:gap-0 group cursor-pointer p-3 md:p-0 rounded-xl border-2 border-transparent md:border-none hover:bg-blue-50 md:hover:bg-transparent transition">
                                            <span class="hidden md:block text-[9px] text-slate-400 font-black text-center mb-3 uppercase tracking-tighter h-8 flex items-center leading-none group-hover:text-[#003399] transition-colors">
                                                ${label}
                                            </span>
                                            
                                            <input type="radio" 
                                                   name="c${i}_item${idx}" 
                                                   value="${val}" 
                                                   required 
                                                   onchange="window.toggleRetro(${i}, ${idx}, this.value)" 
                                                   class="w-6 h-6 md:w-7 md:h-7 accent-[#003399]">
                                            
                                            <span class="md:hidden font-bold text-slate-600 text-sm italic">${label}</span>
                                        </label>
                                        `;
                                    }).join('')}
                                </div>
                            </div>

                            <div id="retro_c${i}_item${idx}" class="hidden ml-0 md:ml-4 border-l-8 border-red-500 bg-red-50 p-6 rounded-r-3xl fade-in shadow-sm">
                                <label class="block text-xs font-black text-red-700 mb-2 uppercase tracking-widest font-bold">⚠️ Justificación Requerida:</label>
                                <textarea name="retro_c${i}_item${idx}" class="w-full p-4 text-sm bg-white border border-red-200 rounded-2xl outline-none focus:ring-4 focus:ring-red-100 transition shadow-inner font-medium" rows="2" placeholder="Explique por qué marcó 'Totalmente en desacuerdo'..."></textarea>
                            </div>
                        </div>
                    `;
                });

                html += `
                    </div>
                    <div class="flex flex-col sm:flex-row gap-4 pt-10">
                        <button type="button" onclick="prevStep()" class="flex-1 bg-slate-50 hover:bg-slate-100 text-slate-500 font-black py-4 rounded-2xl transition border border-slate-200 uppercase text-xs tracking-widest">Atrás</button>
                        <button type="button" id="btnNext${i}" onclick="handleNext(${i})" class="flex-[2] bg-[#003399] hover:bg-[#002673] text-white font-black py-4 rounded-2xl shadow-xl transition transform hover:-translate-y-1 uppercase text-xs tracking-widest">
                            ${i === numAevaluar ? 'Enviar Calificaciones' : 'Siguiente Compañero'}
                        </button>
                    </div>
                `;
                step.innerHTML = html;
                container.appendChild(step);
            }
        }

        function updateProgress() {
            const totalStepsInApp = totalSteps + 1;
            const progress = (currentStep / totalStepsInApp) * 100;
            document.getElementById('progressBar').style.width = `${progress}%`;
        }

        function handleNext(stepNum) {
            const currentEl = document.getElementById(`step${stepNum}`);
            let valid = true;
            
            const radioGroups = new Set();
            currentEl.querySelectorAll('input[type="radio"][required]').forEach(r => radioGroups.add(r.name));
            radioGroups.forEach(name => { if(!currentEl.querySelector(`input[name="${name}"]:checked`)) valid = false; });
            
            currentEl.querySelectorAll('input[type="text"][required], textarea[required]').forEach(input => { 
                if(!input.value.trim()) valid = false; 
            });

            if(!valid) {
                showStatus("Faltan datos", "Por favor completa toda la evaluación y las justificaciones del compañero antes de continuar.", "⚠️");
                return;
            }

            if (stepNum === totalSteps) {
                // Si es el último, enviar datos automáticamente
                submitData();
            } else {
                nextStep(stepNum + 1);
            }
        }

        function nextStep(target) {
            const currentEl = document.getElementById(`step${currentStep}`);
            if(currentStep === 0) createDynamicSteps();
            
            currentEl.classList.remove('active');
            currentStep = target;
            document.getElementById(`step${currentStep}`).classList.add('active');
            updateProgress();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function prevStep() {
            const currentEl = document.getElementById(`step${currentStep}`);
            currentEl.classList.remove('active');
            currentStep = currentStep - 1;
            document.getElementById(`step${currentStep}`).classList.add('active');
            updateProgress();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function submitData() {
            if (!GOOGLE_SCRIPT_URL) {
                showStatus("Configuración Pendiente", "La URL de Google Sheets no ha sido configurada.", "📋");
                return;
            }
            if (isSubmitting) return;

            isSubmitting = true;
            showLoading("Enviando resultados...", "Estamos guardando tus evaluaciones de forma segura. Por favor no cierres esta ventana.");

            const form = document.getElementById('evaluationForm');
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());

            try {
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                showStatus("¡Resultados Enviados!", "La coevaluación se ha guardado con éxito. Gracias por tu participación.", "✅");
                // Deshabilitar botones para evitar reenvíos
                document.querySelectorAll('button').forEach(b => b.disabled = true);
                setTimeout(() => location.reload(), 5000);
            } catch (error) {
                showStatus("Error de Conexión", "No pudimos enviar los datos. Revisa tu conexión e intenta de nuevo.", "❌");
                isSubmitting = false;
            }
        }

        function showLoading(title, desc) {
            document.getElementById('statusTitle').innerText = title;
            document.getElementById('statusDesc').innerText = desc;
            document.getElementById('statusIcon').classList.add('hidden');
            document.getElementById('loadingIndicator').classList.remove('hidden');
            document.getElementById('statusBtn').classList.add('hidden');
            document.getElementById('statusMessage').classList.remove('hidden');
        }

        function showStatus(title, desc, icon) {
            document.getElementById('statusTitle').innerText = title;
            document.getElementById('statusDesc').innerText = desc;
            document.getElementById('statusIcon').innerText = icon;
            document.getElementById('statusIcon').classList.remove('hidden');
            document.getElementById('loadingIndicator').classList.add('hidden');
            document.getElementById('statusBtn').classList.remove('hidden');
            document.getElementById('statusMessage').classList.remove('hidden');
        }

        function closeStatus() {
            if (!isSubmitting) {
                document.getElementById('statusMessage').classList.add('hidden');
            }
        }
    </script>
</body>
</html>
